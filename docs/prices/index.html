<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockWatch — Price Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root, [data-theme="dark"] {
    --color-bg: #0d1117;
    --color-surface: #161b22;
    --color-surface-2: #1c2128;
    --color-surface-offset: #21262d;
    --color-border: #30363d;
    --color-divider: #21262d;
    --color-text: #e6edf3;
    --color-text-muted: #8b949e;
    --color-text-faint: #484f58;
    --color-primary: #388bfd;
    --color-primary-hover: #58a6ff;
    --color-primary-highlight: #1f3358;
    --color-success: #3fb950;
    --color-success-muted: #1a3a24;
    --color-error: #f85149;
    --color-error-muted: #3d1a1a;
    --color-warning: #e3b341;
    --color-warning-muted: #3a2f12;
    --font-display: 'Inter', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --radius-sm: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --transition-interactive: 150ms cubic-bezier(0.16, 1, 0.3, 1);
    --plotly-bg: #0d1117;
    --plotly-surface: #161b22;
    --plotly-grid: #21262d;
    --plotly-line: #30363d;
    --plotly-text: #8b949e;
  }

  [data-theme="light"] {
    --color-bg: #f6f8fa;
    --color-surface: #ffffff;
    --color-surface-2: #f6f8fa;
    --color-surface-offset: #f0f3f6;
    --color-border: #d0d7de;
    --color-divider: #eaeef2;
    --color-text: #1f2328;
    --color-text-muted: #656d76;
    --color-text-faint: #adb5bd;
    --color-primary: #0969da;
    --color-primary-hover: #0550ae;
    --color-primary-highlight: #dbeafe;
    --color-success: #1a7f37;
    --color-success-muted: #d4f8df;
    --color-error: #cf222e;
    --color-error-muted: #fde8e8;
    --color-warning: #9a6700;
    --color-warning-muted: #fff8c5;
    --plotly-bg: #f6f8fa;
    --plotly-surface: #ffffff;
    --plotly-grid: #eaeef2;
    --plotly-line: #d0d7de;
    --plotly-text: #656d76;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 56px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    backdrop-filter: blur(12px);
  }
  .site-header .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--color-text);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 16px;
    flex-shrink: 0;
  }
  .site-header .logo svg { color: var(--color-primary); }
  .site-header nav { display: flex; gap: 4px; margin: 0 auto; }
  .site-header nav a {
    color: var(--color-text-muted);
    text-decoration: none;
    padding: 6px 16px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    transition: color var(--transition-interactive), background var(--transition-interactive);
  }
  .site-header nav a:hover { color: var(--color-text); background: var(--color-surface-offset); }
  .site-header nav a.active { color: var(--color-text); background: var(--color-surface-2); }
  .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .theme-toggle {
    background: none;
    border: 1px solid var(--color-border);
    color: var(--color-text-muted);
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color var(--transition-interactive), border-color var(--transition-interactive);
  }
  .theme-toggle:hover { color: var(--color-text); border-color: var(--color-text-muted); }
  .hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--color-text-muted);
    cursor: pointer;
    padding: 4px;
  }
  .mobile-nav {
    display: none;
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    padding: 8px 16px;
    z-index: 99;
    flex-direction: column;
    gap: 4px;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    color: var(--color-text-muted);
    text-decoration: none;
    padding: 10px 16px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
  }
  .mobile-nav a.active { color: var(--color-text); background: var(--color-surface-2); }
  @media (max-width: 768px) {
    .site-header nav { display: none; }
    .hamburger { display: block; }
  }

  /* Container */
  .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

  /* Ticker pills */
  .ticker-pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 20px;
    scrollbar-width: thin;
  }
  .ticker-pill {
    padding: 6px 16px;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: var(--color-surface);
    color: var(--color-text-muted);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all var(--transition-interactive);
    flex-shrink: 0;
  }
  .ticker-pill:hover {
    color: var(--color-text);
    border-color: var(--color-text-muted);
  }
  .ticker-pill.active {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
  }

  /* Time range buttons */
  .range-group {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
  }
  .range-btn {
    padding: 6px 14px;
    background: var(--color-surface);
    color: var(--color-text-muted);
    border: 1px solid var(--color-border);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition-interactive);
  }
  .range-btn:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
  .range-btn:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; }
  .range-btn + .range-btn { border-left: none; }
  .range-btn:hover { color: var(--color-text); background: var(--color-surface-offset); }
  .range-btn.active {
    background: var(--color-primary-highlight);
    color: var(--color-primary);
    border-color: var(--color-primary);
  }
  .range-btn.active + .range-btn { border-left-color: var(--color-primary); }

  /* Chart + info layout */
  .chart-layout {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 1024px) {
    .chart-layout { grid-template-columns: 1fr; }
  }

  /* Card */
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--color-divider);
  }
  .card-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text);
  }
  .card-body { padding: 16px; }

  .chart-box {
    border-radius: var(--radius-md);
    overflow: hidden;
    margin-bottom: 16px;
    min-height: 400px;
  }
  .chart-box:last-child { margin-bottom: 0; }

  /* Info panel */
  .info-panel {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 20px;
  }
  .info-panel h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
  }
  .info-row + .info-row { border-top: 1px solid var(--color-divider); }
  .info-row .info-label { color: var(--color-text-muted); }
  .info-row .info-value {
    font-family: var(--font-mono);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* Loading */
  .loading-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--color-text-muted);
  }
  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--color-error);
    background: var(--color-error-muted);
    border-radius: var(--radius-lg);
    margin: 20px 0;
  }

  .site-footer {
    text-align: center;
    padding: 24px 0;
    color: var(--color-text-faint);
    font-size: 12px;
    margin-top: 48px;
    border-top: 1px solid var(--color-divider);
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="../" class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
      <polyline points="16 7 22 7 22 13"/>
    </svg>
    StockWatch
  </a>
  <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <nav>
    <a href="../">Overview</a>
    <a href="./" class="active">Prices</a>
    <a href="../charts/">Charts</a>
    <a href="../portfolio/">Portfolio</a>
  </nav>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="mobile-nav" id="mobileNav">
  <a href="../">Overview</a>
  <a href="./" class="active">Prices</a>
  <a href="../charts/">Charts</a>
  <a href="../portfolio/">Portfolio</a>
</div>

<div class="container">
  <div class="ticker-pills" id="tickerPills">
    <div class="loading-state" style="padding:20px;width:100%;text-align:center;color:var(--color-text-muted)">Loading tickers...</div>
  </div>

  <div class="range-group">
    <button class="range-btn" data-range="7">1W</button>
    <button class="range-btn" data-range="30">1M</button>
    <button class="range-btn" data-range="90">3M</button>
    <button class="range-btn" data-range="180">6M</button>
    <button class="range-btn active" data-range="365">1Y</button>
    <button class="range-btn" data-range="0">MAX</button>
  </div>

  <div class="chart-layout">
    <div>
      <div id="candlestickChart" class="chart-box">
        <div class="loading-state"><div class="spinner"></div><div>Loading chart data...</div></div>
      </div>
      <div id="rsiChart" class="chart-box" style="min-height:200px;"></div>
      <div id="macdChart" class="chart-box" style="min-height:200px;"></div>
    </div>
    <div class="info-panel" id="infoPanel">
      <h3>Current Stats</h3>
      <div style="color:var(--color-text-muted);font-size:13px;">Select a ticker to view stats</div>
    </div>
  </div>
</div>

<footer class="site-footer">
  StockWatch &mdash; Interactive price charts powered by Plotly.js
</footer>

<script>
(function() {
  // Theme
  var saved = localStorage.getItem('stockwatch-theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);

  document.getElementById('themeToggle').addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('stockwatch-theme', next);
    updateThemeIcon(next);
    if (currentData) renderCharts(currentData);
  });

  function updateThemeIcon(t) {
    document.querySelector('.icon-sun').style.display = t === 'dark' ? 'block' : 'none';
    document.querySelector('.icon-moon').style.display = t === 'light' ? 'block' : 'none';
  }

  document.getElementById('hamburgerBtn').addEventListener('click', function() {
    document.getElementById('mobileNav').classList.toggle('open');
  });

  var tickerPills = document.getElementById('tickerPills');
  var rangeBtns = document.querySelectorAll('.range-btn');
  var currentRange = 365;
  var currentData = null;
  var currentTicker = '';
  var signalsMap = {};

  function getPlotlyTheme() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    return {
      paper_bgcolor: isDark ? '#161b22' : '#ffffff',
      plot_bgcolor: isDark ? '#0d1117' : '#f6f8fa',
      font: { family: 'Inter, system-ui, sans-serif', color: isDark ? '#8b949e' : '#656d76', size: 11 },
      xaxis: { gridcolor: isDark ? '#21262d' : '#eaeef2', linecolor: isDark ? '#30363d' : '#d0d7de', rangeslider: { visible: false } },
      yaxis: { gridcolor: isDark ? '#21262d' : '#eaeef2', linecolor: isDark ? '#30363d' : '#d0d7de' },
      margin: { l: 50, r: 16, t: 36, b: 40 }
    };
  }

  var plotlyConfig = { responsive: true, displayModeBar: false };

  // Load tickers + signals
  Promise.all([
    fetch('../data/tickers.json').then(function(r) { return r.json(); }),
    fetch('../data/signals.json').then(function(r) { return r.json(); }).catch(function() { return []; })
  ]).then(function(results) {
    var tickers = results[0];
    results[1].forEach(function(s) { signalsMap[s.ticker] = s; });

    tickerPills.innerHTML = '';
    tickers.forEach(function(t, i) {
      var btn = document.createElement('button');
      btn.className = 'ticker-pill' + (i === 0 ? ' active' : '');
      btn.textContent = t;
      btn.addEventListener('click', function() {
        tickerPills.querySelectorAll('.ticker-pill').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        loadTicker(t);
      });
      tickerPills.appendChild(btn);
    });
    if (tickers.length > 0) loadTicker(tickers[0]);
  }).catch(function() {
    tickerPills.innerHTML = '<div style="color:var(--color-error)">Failed to load tickers</div>';
  });

  rangeBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      rangeBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentRange = parseInt(btn.getAttribute('data-range'));
      if (currentData) renderCharts(currentData);
    });
  });

  function filterByRange(data) {
    if (currentRange === 0) return data;
    var cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - currentRange);
    var cutoffStr = cutoff.toISOString().slice(0, 10);
    return data.filter(function(d) { return d.date >= cutoffStr; });
  }

  function loadTicker(ticker) {
    currentTicker = ticker;
    document.getElementById('candlestickChart').innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Loading ' + ticker + '...</div></div>';
    document.getElementById('rsiChart').innerHTML = '';
    document.getElementById('macdChart').innerHTML = '';

    fetch('../data/' + ticker + '_ohlcv.json')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        currentData = data;
        renderCharts(data);
        updateInfoPanel(data, ticker);
      })
      .catch(function(err) {
        document.getElementById('candlestickChart').innerHTML = '<div class="error-state">Failed to load data: ' + err.message + '</div>';
      });
  }

  function updateInfoPanel(data, ticker) {
    var panel = document.getElementById('infoPanel');
    var last = data[data.length - 1];
    if (!last) { panel.innerHTML = '<h3>No Data</h3>'; return; }

    var sig = signalsMap[ticker];
    var dayRange = '$' + last.low.toFixed(2) + ' - $' + last.high.toFixed(2);

    // Compute 52-week range
    var cutoff52 = new Date();
    cutoff52.setDate(cutoff52.getDate() - 365);
    var cutoffStr = cutoff52.toISOString().slice(0, 10);
    var yearData = data.filter(function(d) { return d.date >= cutoffStr; });
    var yearLow = Infinity, yearHigh = -Infinity;
    yearData.forEach(function(d) {
      if (d.low < yearLow) yearLow = d.low;
      if (d.high > yearHigh) yearHigh = d.high;
    });
    var range52 = (yearLow !== Infinity) ? ('$' + yearLow.toFixed(2) + ' - $' + yearHigh.toFixed(2)) : 'N/A';

    var html = '<h3>' + ticker + ' Stats</h3>';
    var rows = [
      ['Price', '$' + last.close.toFixed(2)],
      ['Day Range', dayRange],
      ['52W Range', range52],
      ['RSI', last.rsi !== null ? last.rsi.toFixed(1) : 'N/A'],
      ['MACD', last.macd !== null ? last.macd.toFixed(4) : 'N/A'],
      ['Signal', sig ? sig.signal : 'N/A']
    ];
    rows.forEach(function(r) {
      var extraCls = '';
      if (r[0] === 'Signal') {
        if (r[1] === 'BUY') extraCls = ' style="color:var(--color-success)"';
        else if (r[1] === 'SELL') extraCls = ' style="color:var(--color-error)"';
        else if (r[1] === 'HOLD') extraCls = ' style="color:var(--color-warning)"';
      }
      html += '<div class="info-row"><span class="info-label">' + r[0] + '</span><span class="info-value"' + extraCls + '>' + r[1] + '</span></div>';
    });
    panel.innerHTML = html;
  }

  function renderCharts(rawData) {
    var data = filterByRange(rawData);
    var dates = data.map(function(d) { return d.date; });
    var opens = data.map(function(d) { return d.open; });
    var highs = data.map(function(d) { return d.high; });
    var lows = data.map(function(d) { return d.low; });
    var closes = data.map(function(d) { return d.close; });

    var theme = getPlotlyTheme();

    // Candlestick
    var candleTrace = {
      x: dates, open: opens, high: highs, low: lows, close: closes,
      type: 'candlestick',
      increasing: { line: { color: '#3fb950' }, fillcolor: '#3fb950' },
      decreasing: { line: { color: '#f85149' }, fillcolor: '#f85149' }
    };

    var sma20 = data.map(function(d) { return d.sma20; });
    var sma50 = data.map(function(d) { return d.sma50; });
    var bbUpper = data.map(function(d) { return d.bb_upper; });
    var bbLower = data.map(function(d) { return d.bb_lower; });

    var traces = [candleTrace];
    traces.push({ x: dates, y: sma20, type: 'scatter', mode: 'lines', line: { color: '#e3b341', width: 1 }, name: 'SMA 20' });
    traces.push({ x: dates, y: sma50, type: 'scatter', mode: 'lines', line: { color: '#f0883e', width: 1 }, name: 'SMA 50' });
    traces.push({ x: dates, y: bbUpper, type: 'scatter', mode: 'lines', line: { color: '#484f58', width: 1, dash: 'dash' }, name: 'BB Upper' });
    traces.push({ x: dates, y: bbLower, type: 'scatter', mode: 'lines', line: { color: '#484f58', width: 1, dash: 'dash' }, name: 'BB Lower' });

    var candleLayout = Object.assign({}, theme, {
      title: { text: currentTicker + ' \u2014 Price', font: { color: theme.font.color, size: 13, family: 'Inter' } },
      showlegend: true,
      legend: { font: { size: 10, family: 'Inter' }, bgcolor: 'rgba(0,0,0,0)', orientation: 'h', y: 1.05 },
      height: 450
    });
    Plotly.newPlot('candlestickChart', traces, candleLayout, plotlyConfig);

    // RSI
    var rsiVals = data.map(function(d) { return d.rsi; });
    var rsiTraces = [
      { x: dates, y: rsiVals, type: 'scatter', mode: 'lines', line: { color: '#388bfd', width: 1.5 }, name: 'RSI', fill: 'tozeroy', fillcolor: 'rgba(56,139,253,0.05)' },
      { x: [dates[0], dates[dates.length - 1]], y: [70, 70], type: 'scatter', mode: 'lines', line: { color: '#f85149', width: 1, dash: 'dash' }, showlegend: false },
      { x: [dates[0], dates[dates.length - 1]], y: [30, 30], type: 'scatter', mode: 'lines', line: { color: '#3fb950', width: 1, dash: 'dash' }, showlegend: false }
    ];
    var rsiLayout = Object.assign({}, theme, {
      title: { text: 'RSI (14)', font: { color: theme.font.color, size: 12, family: 'Inter' } },
      yaxis: Object.assign({}, theme.yaxis, { range: [0, 100] }),
      height: 200, showlegend: false
    });
    Plotly.newPlot('rsiChart', rsiTraces, rsiLayout, plotlyConfig);

    // MACD
    var macdVals = data.map(function(d) { return d.macd; });
    var macdSig = data.map(function(d) { return d.macd_signal; });
    var macdHist = data.map(function(d) { return d.macd_hist; });
    var histColors = macdHist.map(function(v) { return v >= 0 ? '#3fb950' : '#f85149'; });

    var macdTraces = [
      { x: dates, y: macdHist, type: 'bar', marker: { color: histColors }, name: 'Histogram', opacity: 0.6 },
      { x: dates, y: macdVals, type: 'scatter', mode: 'lines', line: { color: '#388bfd', width: 1.5 }, name: 'MACD' },
      { x: dates, y: macdSig, type: 'scatter', mode: 'lines', line: { color: '#f0883e', width: 1 }, name: 'Signal' }
    ];
    var macdLayout = Object.assign({}, theme, {
      title: { text: 'MACD', font: { color: theme.font.color, size: 12, family: 'Inter' } },
      height: 200, showlegend: true,
      legend: { font: { size: 10, family: 'Inter' }, bgcolor: 'rgba(0,0,0,0)', orientation: 'h', y: 1.1 },
      barmode: 'relative'
    });
    Plotly.newPlot('macdChart', macdTraces, macdLayout, plotlyConfig);
  }
})();
</script>
