<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockWatch — ML Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root, [data-theme="dark"] {
    --color-bg: #0d1117;
    --color-surface: #161b22;
    --color-surface-2: #1c2128;
    --color-surface-offset: #21262d;
    --color-border: #30363d;
    --color-divider: #21262d;
    --color-text: #e6edf3;
    --color-text-muted: #8b949e;
    --color-text-faint: #484f58;
    --color-primary: #388bfd;
    --color-primary-hover: #58a6ff;
    --color-primary-highlight: #1f3358;
    --color-success: #3fb950;
    --color-success-muted: #1a3a24;
    --color-error: #f85149;
    --color-error-muted: #3d1a1a;
    --color-warning: #e3b341;
    --color-warning-muted: #3a2f12;
    --font-display: 'Inter', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --radius-sm: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --transition-interactive: 150ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  [data-theme="light"] {
    --color-bg: #f6f8fa;
    --color-surface: #ffffff;
    --color-surface-2: #f6f8fa;
    --color-surface-offset: #f0f3f6;
    --color-border: #d0d7de;
    --color-divider: #eaeef2;
    --color-text: #1f2328;
    --color-text-muted: #656d76;
    --color-text-faint: #adb5bd;
    --color-primary: #0969da;
    --color-primary-hover: #0550ae;
    --color-primary-highlight: #dbeafe;
    --color-success: #1a7f37;
    --color-success-muted: #d4f8df;
    --color-error: #cf222e;
    --color-error-muted: #fde8e8;
    --color-warning: #9a6700;
    --color-warning-muted: #fff8c5;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 56px;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    backdrop-filter: blur(12px);
  }
  .site-header .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--color-text);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 16px;
    flex-shrink: 0;
  }
  .site-header .logo svg { color: var(--color-primary); }
  .site-header nav { display: flex; gap: 4px; margin: 0 auto; }
  .site-header nav a {
    color: var(--color-text-muted);
    text-decoration: none;
    padding: 6px 16px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    transition: color var(--transition-interactive), background var(--transition-interactive);
  }
  .site-header nav a:hover { color: var(--color-text); background: var(--color-surface-offset); }
  .site-header nav a.active { color: var(--color-text); background: var(--color-surface-2); }
  .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .theme-toggle {
    background: none;
    border: 1px solid var(--color-border);
    color: var(--color-text-muted);
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color var(--transition-interactive), border-color var(--transition-interactive);
  }
  .theme-toggle:hover { color: var(--color-text); border-color: var(--color-text-muted); }
  .hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--color-text-muted);
    cursor: pointer;
    padding: 4px;
  }
  .mobile-nav {
    display: none;
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    padding: 8px 16px;
    z-index: 99;
    flex-direction: column;
    gap: 4px;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    color: var(--color-text-muted);
    text-decoration: none;
    padding: 10px 16px;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
  }
  .mobile-nav a.active { color: var(--color-text); background: var(--color-surface-2); }
  @media (max-width: 768px) {
    .site-header nav { display: none; }
    .hamburger { display: block; }
  }

  /* Container */
  .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

  /* Page header */
  .page-header {
    margin-bottom: 24px;
  }
  .page-header h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .page-header p {
    color: var(--color-text-muted);
    font-size: 14px;
  }

  /* Filter pills */
  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .filter-pill {
    padding: 6px 16px;
    border: 1px solid var(--color-border);
    border-radius: 999px;
    background: var(--color-surface);
    color: var(--color-text-muted);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition-interactive);
  }
  .filter-pill:hover { color: var(--color-text); border-color: var(--color-text-muted); }
  .filter-pill.active {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
  }

  /* Chart grid */
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 1024px) {
    .chart-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .chart-grid { grid-template-columns: 1fr; }
  }

  /* Chart card */
  .chart-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: box-shadow var(--transition-interactive), border-color var(--transition-interactive);
  }
  .chart-card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--color-text-faint);
  }
  .chart-card img {
    width: 100%;
    height: auto;
    display: block;
    background: var(--color-surface-2);
  }
  .chart-card-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--color-divider);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chart-card-footer .chart-name {
    font-size: 13px;
    font-weight: 500;
  }
  .chart-card-footer .chart-ticker {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-primary);
    background: var(--color-primary-highlight);
    padding: 2px 8px;
    border-radius: 999px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    background: var(--color-surface);
    border: 1px dashed var(--color-border);
    border-radius: var(--radius-lg);
  }
  .empty-state svg { color: var(--color-text-faint); margin-bottom: 16px; }
  .empty-state h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .empty-state p {
    color: var(--color-text-muted);
    font-size: 14px;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .empty-state code {
    background: var(--color-surface-offset);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: 13px;
  }

  /* Loading */
  .loading-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--color-text-muted);
  }
  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .site-footer {
    text-align: center;
    padding: 24px 0;
    color: var(--color-text-faint);
    font-size: 12px;
    margin-top: 48px;
    border-top: 1px solid var(--color-divider);
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="../" class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
      <polyline points="16 7 22 7 22 13"/>
    </svg>
    StockWatch
  </a>
  <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <nav>
    <a href="../">Overview</a>
    <a href="../prices/">Prices</a>
    <a href="./" class="active">Charts</a>
    <a href="../portfolio/">Portfolio</a>
  </nav>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="mobile-nav" id="mobileNav">
  <a href="../">Overview</a>
  <a href="../prices/">Prices</a>
  <a href="./" class="active">Charts</a>
  <a href="../portfolio/">Portfolio</a>
</div>

<div class="container">
  <div class="page-header">
    <h1>ML Analysis Charts</h1>
    <p>Model performance, feature importance, and prediction analysis visualizations</p>
  </div>

  <div class="filter-pills" id="filterPills">
    <button class="filter-pill active" data-filter="all">All</button>
  </div>

  <div id="content">
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Scanning for analysis plots...</div>
    </div>
  </div>
</div>

<footer class="site-footer">
  StockWatch &mdash; Charts auto-generated from ML pipeline
</footer>

<script>
(function() {
  // Theme
  var saved = localStorage.getItem('stockwatch-theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  var theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);

  document.getElementById('themeToggle').addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('stockwatch-theme', next);
    updateThemeIcon(next);
  });

  function updateThemeIcon(t) {
    document.querySelector('.icon-sun').style.display = t === 'dark' ? 'block' : 'none';
    document.querySelector('.icon-moon').style.display = t === 'light' ? 'block' : 'none';
  }

  document.getElementById('hamburgerBtn').addEventListener('click', function() {
    document.getElementById('mobileNav').classList.toggle('open');
  });

  var contentEl = document.getElementById('content');
  var filterPills = document.getElementById('filterPills');
  var allPlots = [];
  var activeFilter = 'all';

  var knownPlots = [
    'confusion_matrix.png', 'feature_importance.png', 'roc_curve.png',
    'shap_summary.png', 'equity_curve.png', 'drawdown.png',
    'cumulative_returns.png', 'learning_curve.png'
  ];

  function tryLoadImage(src) {
    return new Promise(function(resolve) {
      var img = new Image();
      img.onload = function() { resolve(true); };
      img.onerror = function() { resolve(false); };
      img.src = src;
    });
  }

  function formatTitle(filename) {
    return filename.replace('.png', '').replace(/_/g, ' ').replace(/\b\w/g, function(c) {
      return c.toUpperCase();
    });
  }

  function extractTicker(filename) {
    var parts = filename.split('_');
    if (parts.length > 1) {
      var first = parts[0].toUpperCase();
      if (['JNJ','UNH','ABT','PG','KO','WMT','NEE','DUK','SPY'].indexOf(first) >= 0) return first;
    }
    return 'General';
  }

  function renderPlots(plots) {
    if (plots.length === 0 && activeFilter !== 'all') {
      contentEl.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><h3>No charts for this filter</h3><p>Try selecting a different ticker or "All"</p></div>';
      return;
    }
    if (plots.length === 0) {
      contentEl.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><h3>No Analysis Charts Available</h3><p>Run the ML pipeline locally to generate charts, then commit to <code>reports/plots/</code></p></div>';
      return;
    }

    var html = '<div class="chart-grid">';
    plots.forEach(function(p) {
      var ticker = extractTicker(p);
      html += '<div class="chart-card" data-ticker="' + ticker + '">';
      html += '<img src="plots/' + p + '" alt="' + formatTitle(p) + '" loading="lazy">';
      html += '<div class="chart-card-footer">';
      html += '<span class="chart-name">' + formatTitle(p) + '</span>';
      if (ticker !== 'General') html += '<span class="chart-ticker">' + ticker + '</span>';
      html += '</div></div>';
    });
    html += '</div>';
    contentEl.innerHTML = html;
  }

  async function loadPlots() {
    var tickers = [];
    try {
      var resp = await fetch('../data/tickers.json');
      if (resp.ok) tickers = await resp.json();
    } catch(e) {}

    // Build filter pills
    tickers.forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'filter-pill';
      btn.textContent = t;
      btn.setAttribute('data-filter', t);
      filterPills.appendChild(btn);
    });

    // Bind filter clicks
    filterPills.querySelectorAll('.filter-pill').forEach(function(btn) {
      btn.addEventListener('click', function() {
        filterPills.querySelectorAll('.filter-pill').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeFilter = btn.getAttribute('data-filter');
        var filtered = activeFilter === 'all' ? allPlots : allPlots.filter(function(f) {
          return extractTicker(f) === activeFilter || extractTicker(f) === 'General';
        });
        renderPlots(filtered);
      });
    });

    // Build candidate list
    var candidates = knownPlots.slice();
    tickers.forEach(function(t) {
      knownPlots.forEach(function(p) {
        candidates.push(t.toLowerCase() + '_' + p);
        candidates.push(t + '_' + p);
      });
    });

    var found = [];
    var checks = candidates.map(function(fname) {
      return tryLoadImage('plots/' + fname).then(function(exists) {
        if (exists) found.push(fname);
      });
    });

    await Promise.all(checks);
    found.sort();
    allPlots = found;
    renderPlots(found);
  }

  loadPlots();
})();
</script>
</body>
</html>
