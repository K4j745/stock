name: Update Dashboard Data

on:
  schedule:
    - cron: '0 17 * * 1-5'  # Mon-Fri 17:00 UTC (after US market close)
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh all data'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r dashboard/requirements.txt

      - name: Generate dashboard data
        run: python dashboard/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
